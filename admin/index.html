<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель салона</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #f9f9f9; }
    </style>
</head>
<body>

<div class="card">
    <h2>📋 Все записи клиентов</h2>
    <table id="adminTable">
        <thead>
            <tr>
                <th>Дата</th>
                <th>Время</th>
                <th>Мастер</th>
                <th>Клиент</th>
                <th>Телефон</th>
                <th>Услуга</th>
                <th>Цена (₸)</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="7">Загрузка...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const API_URL = "http://localhost:3000/api";

    async function loadAppointments() {
        const tableBody = document.querySelector("#adminTable tbody");

        try {
            const res = await fetch(`${API_URL}/admin/appointments`);
            const appointments = await res.json();

            tableBody.innerHTML = ""; // Очищаем

            appointments.forEach(app => {
                const row = `
                    <tr>
                        <td>${app.date}</td>
                        <td>${app.time.slice(0, 5)}</td>
                        <td>${app.master}</td>
                        <td>${app.name}</td>
                        <td>${app.phone}</td>
                        <td>${app.service}</td>
                        <td>${app.price}</td>
                    </tr>
                `;
                tableBody.insertAdjacentHTML('beforeend', row);
            });

        } catch (e) {
            tableBody.innerHTML = "<tr><td colspan='7'>Ошибка загрузки.</td></tr>";
        }
    }

    loadAppointments();
</script>

</body>
</html>
