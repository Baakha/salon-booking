<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запись в салон</title>
    <style>
        :root { --p: #ff69b4; --g: #2ecc71; --r: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; margin: 0; padding-bottom: 120px; }
        .container { max-width: 400px; margin: auto; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .legend { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; font-size: 12px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .slots { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0; }
        .slot { padding: 12px 0; text-align: center; border-radius: 10px; border: 2px solid #f0f0f0; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.3s; }
        .free { background: #f0fff4; color: #27ae60; }
        .busy { background: #fff5f5; color: var(--r); cursor: not-allowed; opacity: 0.5; border-color: #ffe0e0; }
        .selected { background: var(--p) !important; color: white !important; border-color: var(--p); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; background: var(--p); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #ccc; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 25px; border-radius: 30px; display: none; z-index: 1001; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3 style="text-align:center; margin:0 0 20px 0;">💅 Запись онлайн</h3>
        <div class="legend">
            <span><div class="dot" style="background:var(--g)"></div> Свободно</span>
            <span><div class="dot" style="background:var(--r)"></div> Занято</span>
        </div>

        <select id="master"><option>Анна</option><option>Мария</option></select>
        <select id="service"><option data-price="5000">Маникюр (5000₸)</option></select>
        <input type="date" id="dateInput">

        <div id="slots" class="slots"></div>

        <input id="userName" placeholder="Ваше имя">
        <input id="userPhone" placeholder="Ваш телефон">
        <button class="btn" id="bookBtn">ЗАПИСАТЬСЯ</button>
    </div>
</div>

<div id="toast"></div>

<script src="script.js"></script>

</body>
</html>
