<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ Панель Салона</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #eee; transition: 0.3s; }
        .tab-btn.active { background: #ff69b4; color: white; }
        
        .date-group { margin-bottom: 25px; }
        .date-header { background: #f8f9fa; padding: 8px 15px; border-left: 4px solid #ff69b4; font-weight: bold; margin-bottom: 10px; color: #333; }
        
        .record-card { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 8px;
            background: #fff; transition: 0.2s;
        }
        .record-card:hover { border-color: #ff69b4; }
        .info b { font-size: 1.1em; color: #ff69b4; }
        .info small { color: #666; display: block; margin-top: 4px; }
        
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn-del:hover { background: #cc0000; }
    </style>
</head>
<body>

<div class="container">
    <h2>управление записями</h2>
    
    <div class="tabs">
        <button id="btn-active" class="tab-btn active" onclick="showTab('active')">📅 Актуальные</button>
        <button id="btn-archive" class="tab-btn" onclick="showTab('archive')">📁 Архив</button>
    </div>

    <div id="active-list"></div>
    <div id="archive-list" style="display:none;"></div>
</div>

<script src="admin.js"></script>
</body>
</html>
